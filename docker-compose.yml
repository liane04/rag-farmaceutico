services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    container_name: rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # A API fala com o Qdrant através do porto publicado no host.
      # Isto evita problemas de resolução de nome quando a API corre noutro contexto.
      - QDRANT_HOST=host.docker.internal
      - QDRANT_PORT=6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
